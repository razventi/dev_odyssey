# Hugo 설정 — 개발 블로그 (PaperMod)
baseURL = "https://razventi.github.io/dev_odyssey/"
languageCode = "ko-kr"
defaultContentLanguage = "ko"
title = "CodePlay"
theme = "PaperMod"

enableInlineShortcodes = true
enableRobotsTXT = true
hasCJKLanguage = true            # 한국어 단어 수/요약 정확도
summaryLength = 30

[pagination]
  pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]   # JSON = 검색 인덱스

# 분류 체계: 카테고리 + 태그 (폴리스너츠 한글화 = 하나의 카테고리)
[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  env = "production"
  description = "개발·기술·게임 한글화 기록"
  mainSections = ["projects"]   # 홈에서 시간순 글 피드 숨김(프로젝트 목록만 노출) — "projects" 섹션은 없음
  keywords = ["개발", "블로그", "한글패치", "폴리스너츠"]
  author = "라즈벤티"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShareButtons = ["x"]          # 공유 버튼은 X(트위터)만 표시
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowPostNavLinks = true
  ShowRssButtonInSectionTermList = true
  disableSpecial1stPost = false

  # 홈 화면 인사말
  [params.homeInfoParams]
    Title = "라즈벤티 개발 오디세이"
    Content = """
**코드로 즐거움을 설계하는 게임 개발자.**

작업 노트 — 게임 개발을 중심으로, 코드와 기술 실험에 대한 생각을 호기심 가는 대로 기록합니다.

### 프로젝트

<style>
.proj-grid{display:flex;flex-wrap:wrap;gap:1rem;margin:1.2rem 0}
.proj-card{flex:1 1 220px;max-width:280px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--entry);text-decoration:none!important;color:inherit;display:block;transition:transform .15s ease}
.proj-card:hover{transform:translateY(-4px)}
.proj-card img{width:100%;height:160px;object-fit:cover;display:block}
.proj-card.iconcover img{object-fit:contain;background:var(--code-bg);padding:.4rem}
.proj-card .ph{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:2.6rem;background:var(--code-bg)}
.proj-card .body{padding:.8rem 1rem}
.proj-card .t{font-weight:700}
.proj-card .s{font-size:.85rem;opacity:.7;margin-top:.25rem}
.proj-card.soon{opacity:.6}
</style>

<div class="proj-grid">
<a class="proj-card" href="/dev_odyssey/categories/폴리스너츠-한글화/">
<img src="/dev_odyssey/img/policenauts-cover.jpg" alt="폴리스너츠">
<div class="body"><div class="t">🚓 폴리스너츠 한글화</div><div class="s">세가 새턴 한국어 번역 패치 · 완료</div></div>
</a>
<a class="proj-card soon iconcover" href="/dev_odyssey/categories/포커와-토비/">
<img src="/dev_odyssey/img/toby-cover.png" alt="포커와 토비">
<div class="body"><div class="t">포커와 토비</div><div class="s">준비 중</div></div>
</a>
<a class="proj-card soon iconcover" href="/dev_odyssey/categories/머지시어터/">
<img src="/dev_odyssey/img/merge-theater-cover.png" alt="머지시어터">
<div class="body"><div class="t">머지시어터</div><div class="s">준비 중</div></div>
</a>
</div>
"""

  # 검색 페이지용 (Fuse.js)
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 상단 메뉴 — url 은 앞 슬래시 없이(absLangURL 가 baseURL 하위경로를 붙임)
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "글 목록"
    url = "posts/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "소개"
    url = "about/"
    weight = 15
  [[menu.main]]
    identifier = "categories"
    name = "카테고리"
    url = "categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "tags/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "search/"
    weight = 50

[markup.goldmark.renderer]
  unsafe = true       # 마크다운 내 HTML 허용 (배지/버튼 등)
