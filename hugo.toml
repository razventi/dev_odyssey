# Hugo 설정 — 개발 블로그 (PaperMod)
baseURL = "https://razventi.github.io/dev_odyssey/"
languageCode = "ko-kr"
defaultContentLanguage = "ko"
title = "라즈벤티 개발 오딧세이"
theme = "PaperMod"

enableInlineShortcodes = true
enableRobotsTXT = true
hasCJKLanguage = true            # 한국어 단어 수/요약 정확도
summaryLength = 30

[pagination]
  pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]   # JSON = 검색 인덱스

# 분류 체계: 카테고리 + 태그 (폴리스너츠 한글화 = 하나의 카테고리)
[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  env = "production"
  description = "개발·기술·게임 한글화 기록"
  keywords = ["개발", "블로그", "한글패치", "폴리스너츠"]
  author = "라즈벤티"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowPostNavLinks = true
  ShowRssButtonInSectionTermList = true
  disableSpecial1stPost = false

  # 홈 화면 인사말
  [params.homeInfoParams]
    Title = "라즈벤티 개발 오딧세이 👋"
    Content = """
**게임을 만들고 코드로 즐긴다.**

경력 게임 개발자의 작업 기록 — 개발·기술, 그리고 게임 한글화까지 호기심 가는 대로 남깁니다.

대표 프로젝트: **세가 새턴 '폴리스너츠' 한국어 번역 패치** —
[폴리스너츠 한글화 카테고리](/categories/폴리스너츠-한글화/) 에서 진행 기록과 다운로드를 볼 수 있습니다.
"""

  # 검색 페이지용 (Fuse.js)
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/razventi/dev_odyssey"

# 상단 메뉴 — url 은 앞 슬래시 없이(absLangURL 가 baseURL 하위경로를 붙임)
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "글 목록"
    url = "posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "카테고리"
    url = "categories/"
    weight = 20
  [[menu.main]]
    identifier = "polkr"
    name = "폴리스너츠 한글화"
    url = "categories/폴리스너츠-한글화/"
    weight = 30
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "tags/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "search/"
    weight = 50

[markup.goldmark.renderer]
  unsafe = true       # 마크다운 내 HTML 허용 (배지/버튼 등)
